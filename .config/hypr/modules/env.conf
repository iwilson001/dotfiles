###########
### ENV ###
###########

# force wayland?
# env = ELECTRON_OZONE_PLATFORM_HINT,wayland
# env = MOZ_ENABLE_WAYLAND,1
# env = GDK_BACKEND,wayland;x11
# env = QT_QPA_PLATFORM=wayland;x11

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = COLOR_SCHEME_BACKGROUND,32302f
env = COLOR_SCHEME_FOREGROUND,f2e5bc
env = COLOR_SCHEME_TEXT_PRIMARY,fabd2f
env = COLOR_SCHEME_GRAY,928374
env = COLOR_SCHEME_BLUE,458588
env = COLOR_SCHEME_YELLOW,d79921
env = COLOR_SCHEME_RED,cc241d
env = COLOR_SCHEME_GREEN,98971a
env = COLOR_SCHEME_PURPLE,b16286
env = COLOR_SCHEME_AQUA,689d6a
env = COLOR_SCHEME_ORANGE,d65d0e

# Some default env vars.
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# Alias
$terminal = kitty
$fileManager = dolphin
$menu = wmenu-run -b -i -f 'JetBrainsMono NL Nerd Font 11.5' -l 25 -p 'program: ' -N $COLOR_SCHEME_BACKGROUND -n $COLOR_SCHEME_FOREGROUND -m $COLOR_SCHEME_FOREGROUND -s $COLOR_SCHEME_FOREGROUND -M $COLOR_SCHEME_YELLOW -S $COLOR_SCHEME_YELLOW
$browser = firefox
